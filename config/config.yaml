# ============================================================
# NatyaVeda Analyzer v2 — Main Configuration
# ============================================================

project:
  name: natyaveda-analyzer
  version: "2.0.0"
  seed: 42

# ──────────────────────────────────────────────────────────────
# DEVICE & GPU — automatically managed by DeviceManager
# Override here if needed
# ──────────────────────────────────────────────────────────────
device:
  # auto: DeviceManager picks based on available GPU/VRAM
  # cuda: force GPU
  # cpu:  force CPU
  mode: "auto"

  # Pose model tier (auto = DeviceManager selects based on VRAM)
  # Options: auto | rtmw-x | vitpose-huge | vitpose-large | vitpose-base | movenet
  pose_tier: "auto"

  # VRAM thresholds for tier selection (GB)
  # These match DeviceManager defaults — adjust if needed
  vram_thresholds:
    rtmw_x:        8.0   # ≥8GB  → RTMW-x (MMPose, 133 kpts)
    vitpose_huge:  6.0   # ≥6GB  → VitPose-Plus-Huge (133 kpts)
    vitpose_large: 4.0   # ≥4GB  → VitPose-Plus-Large (133 kpts)
    vitpose_base:  2.0   # ≥2GB  → VitPose-Plus-Base (133 kpts)
    # <2GB or CPU  → VitPose-Plus-Base on CPU

  fp16: "auto"           # auto | true | false

# ──────────────────────────────────────────────────────────────
# POSE EXTRACTION MODELS
# ──────────────────────────────────────────────────────────────
pose_extraction:

  # MMPose RTMW-x (primary, Tier 1 GPU)
  rtmw:
    config: "td-hm_rtmw-x_8xb2-270e_coco-wholebody-384x288"
    checkpoint: "weights/rtmw-x_simcc-cocktail14_pt-ucoco_270e-384x288-f840f204_20231122.pth"
    keypoints: 133
    detector_confidence: 0.30

  # VitPose-Plus (secondary/alternative, Tiers 2-4)
  vitpose:
    huge:  "usyd-community/vitpose-plus-huge"    # 899M params, GPU ≥6GB
    large: "usyd-community/vitpose-plus-large"   # 434M params, GPU ≥4GB
    base:  "usyd-community/vitpose-plus-base"    # 125M params, GPU ≥2GB or CPU
    person_detector: "facebook/detr-resnet-50"   # pure HF, no MMDet needed

  # MoveNet Thunder (fallback, CPU)
  movenet:
    url: "https://tfhub.dev/google/movenet/singlepose/thunder/4"
    keypoints: 17

  # Ensemble: when RTMW-x is primary, also run VitPose for hand refinement
  ensemble:
    enabled: true
    blend_hands: true      # use VitPose hand kpts if confidence > RTMW hands
    blend_face:  false

  # Frame filtering
  min_body_confidence: 0.30
  sample_fps: 25.0

# ──────────────────────────────────────────────────────────────
# HAND EXTRACTION (MediaPipe — always used, 21 pts × 2 hands)
# ──────────────────────────────────────────────────────────────
hand_extraction:
  model_complexity: 1
  min_detection_confidence: 0.50
  min_tracking_confidence: 0.50

# ──────────────────────────────────────────────────────────────
# VIDEO FEATURES (VideoMAE-v2)
# ──────────────────────────────────────────────────────────────
video_features:
  enabled: true
  model: "MCG-NJU/videomae-large"
  clip_frames: 16
  stride: 8
  feature_dim: 1024

# ──────────────────────────────────────────────────────────────
# DATA REFINEMENT (DanceIsolator)
# ──────────────────────────────────────────────────────────────
refinement:
  scene_threshold: 27.0
  min_dance_confidence: 0.65
  min_motion_threshold: 0.005
  min_scene_duration_sec: 3.0
  min_bbox_fraction: 0.15
  person_detector: "facebook/detr-resnet-50"  # uses HF DETR (no MMDet dependency)

# ──────────────────────────────────────────────────────────────
# DATASET
# ──────────────────────────────────────────────────────────────
dataset:
  clip_length_frames: 64
  clip_stride_frames: 32
  train_ratio: 0.80
  val_ratio:   0.10
  test_ratio:  0.10
  augmentation:
    random_flip:      true
    noise_std:        0.01
    scale_range:      [0.9, 1.1]
    rotation_deg:     15.0
    temporal_jitter:  3

# ──────────────────────────────────────────────────────────────
# MODEL (DanceFormer)
# ──────────────────────────────────────────────────────────────
model:
  name: "danceformer-large"
  pose_embed_dim: 256
  num_transformer_layers: 8
  num_attention_heads: 8
  ff_dim: 1024
  transformer_dropout: 0.1
  max_sequence_length: 128
  num_dance_classes: 8
  num_mudra_classes: 28
  videomae_fusion: true
  videomae_proj_dim: 1024
  dance_loss_weight: 1.0
  mudra_loss_weight: 0.4

# ──────────────────────────────────────────────────────────────
# TRAINING
# ──────────────────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 32        # reduce to 16 if GPU OOM
  num_workers: 4
  pin_memory: true

  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 10
    min_lr: 1.0e-6

  loss:
    dance_cls: "focal"
    focal_gamma: 2.0
    focal_alpha: 0.25
    label_smoothing: 0.1

  ema:
    enabled: true
    decay: 0.999

  gradient:
    clip_norm: 1.0
    accumulation_steps: 1   # set to 2 if reducing batch_size

  logging:
    use_wandb: true
    project: "natyaveda-v2"
    log_every_n_steps: 50

# ──────────────────────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────────────────────
paths:
  data_raw:       "data/raw"
  data_refined:   "data/refined"
  data_processed: "data/processed"
  data_splits:    "data/splits"
  weights:        "weights"
  logs:           "logs"
  reports:        "reports"
  outputs:        "outputs"
